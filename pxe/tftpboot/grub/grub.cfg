set timeout=30

loadfont unicode
insmod http
insmod net

set http_server="192.168.123.180:8080"
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray
set root=(http,${http_server})

menuentry "Start Memtest86+, use built-in support for USB keyboards" {
        set gfxpayload=keep
        linux   memtest64.efi keyboard=both
}

menuentry "Install Ubuntu Noble Desktop (24.04.2) Hardened" {
        set gfxpayload=keep
        linux   /boot/noble/24.04.2-desktop/vmlinuz ip=dhcp cloud-config-url=http://${http_server}/autoinstall/noble/ubuntu2404_desktop_efi_hardened_240402.yaml url=http://${http_server}/images/ubuntu-24.04.2-desktop-amd64.iso autoinstall
        initrd  /boot/noble/24.04.2-desktop/initrd
}

menuentry "Install Ubuntu Noble Desktop (24.04.2) Hardened on a CC" {
        set gfxpayload=keep
        linux   /boot/noble/24.04.2-desktop/vmlinuz ip=dhcp cloud-config-url=http://${http_server}/autoinstall/noble/ubuntu2404_desktop_efi_hardened_240402_CC.yaml url=http://${http_server}/images/ubuntu-24.04.2-desktop-amd64.iso autoinstall
        initrd  /boot/noble/24.04.2-desktop/initrd
}

menuentry "Install Ubuntu Noble Server (24.04.2) Hardened" {
        set gfxpayload=keep
        linux   /boot/noble/24.04.2-server/vmlinuz ip=dhcp cloud-config-url=http://${http_server}/autoinstall/noble/ubuntu2404_server_efi_hardened_240402.yaml url=http://${http_server}/images/ubuntu-24.04.2-live-server-amd64.iso autoinstall
        initrd  /boot/noble/24.04.2-server/initrd
}

