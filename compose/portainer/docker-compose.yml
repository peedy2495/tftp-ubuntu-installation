version: "3.8"
services:
  portainer:
    image: portainer/portainer-ce:lts
    pull_policy: always
    container_name: portainer
    restart: always
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
    external: true
